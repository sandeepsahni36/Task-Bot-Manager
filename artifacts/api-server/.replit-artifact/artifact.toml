kind = "api"
previewPath = "/api"
title = "Holiday Homes Ops Bot"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8000
name = "WhatsApp Bot"
paths = [
  "/docs",
  "/redoc",
  "/openapi.json",
  "/webhooks",
  "/send-test-task",
  "/tasks",
  "/damage-cases",
  "/owner-summary",
  "/send-owner-summary",
  "/dashboard-view",
  "/db",
  "/hostfully",
  "/checkout-inspections",
]

[services.development]
run = "cd artifacts/whatsapp-bot && uvicorn main:app --host 0.0.0.0 --port 8000"

[services.production]

[services.production.run]
args = ["sh", "-c", "pip install -r artifacts/whatsapp-bot/requirements.txt -q && cd artifacts/whatsapp-bot && uvicorn main:app --host 0.0.0.0 --port 8000"]

[services.production.health.startup]
path = "/db/health"
